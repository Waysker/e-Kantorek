name: Forum Sync Publish

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours (UTC)
    - cron: "17 */4 * * *"

jobs:
  sync-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync forum and publish snapshot
        env:
          ORAGH_FORUM_USERNAME: ${{ secrets.ORAGH_FORUM_USERNAME }}
          ORAGH_FORUM_PASSWORD: ${{ secrets.ORAGH_FORUM_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          ORAGH_SNAPSHOT_KEY: forum
        run: npm run forum:sync:publish
