name: Forum Sync Publish

on:
  workflow_dispatch:
  schedule:
    # Every 4 hours (UTC)
    - cron: "17 */4 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          ORAGH_FORUM_USERNAME: ${{ secrets.ORAGH_FORUM_USERNAME }}
          ORAGH_FORUM_PASSWORD: ${{ secrets.ORAGH_FORUM_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          for key in ORAGH_FORUM_USERNAME ORAGH_FORUM_PASSWORD SUPABASE_URL SUPABASE_SECRET_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is missing in repository secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Sync forum and publish snapshot
        env:
          ORAGH_FORUM_USERNAME: ${{ secrets.ORAGH_FORUM_USERNAME }}
          ORAGH_FORUM_PASSWORD: ${{ secrets.ORAGH_FORUM_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ORAGH_SNAPSHOT_KEY: ${{ vars.ORAGH_SNAPSHOT_KEY || 'forum' }}
          ORAGH_INSTRUMENT_OVERRIDES_KEY: ${{ vars.ORAGH_INSTRUMENT_OVERRIDES_KEY || vars.ORAGH_SNAPSHOT_KEY || 'forum' }}
        run: npm run forum:sync:publish
